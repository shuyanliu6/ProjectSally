services:
  # PostgreSQL + TimescaleDB Database
  database:
    image: timescale/timescaledb:latest-pg15
    container_name: stock_picking_db
    environment:
      POSTGRES_USER: ${DB_USER:-stock_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${DB_NAME:-stock_picking_system}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-stock_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stock_network
    restart: unless-stopped

  # Python Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: application
    container_name: stock_picking_app
    environment:
      # Database
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: ${DB_USER:-stock_user}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      DB_NAME: ${DB_NAME:-stock_picking_system}
      # Data providers
      DATA_PROVIDER: ${DATA_PROVIDER:-yfinance}
      EODHD_API_KEY: ${EODHD_API_KEY:-}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY:-}
      # FIX: these two were missing, so MASSIVE_API_KEY set in .env was
      # never forwarded into the container
      MASSIVE_API_KEY: ${MASSIVE_API_KEY:-}
      MASSIVE_BASE_URL: ${MASSIVE_BASE_URL:-https://api.massive.com}
      # App
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEBUG: ${DEBUG:-True}
      START_DATE: ${START_DATE:-2015-01-01}
      END_DATE: ${END_DATE:-2024-12-31}
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    depends_on:
      database:
        condition: service_healthy
    networks:
      - stock_network
    restart: unless-stopped
    stdin_open: true
    tty: true
    command: /bin/bash

volumes:
  postgres_data:
    driver: local

networks:
  stock_network:
    driver: bridge
